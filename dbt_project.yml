
name: 'jaffle_shop_teradata'
version: '0.1'
config-version: 2
profile: 'jaffle_shop_teradata'
model-paths: ["models"]
analysis-paths: ["analysis"]
test-paths: ["tests"]
seed-paths: ["data"]
macro-paths: ["macros"]

target-path: "target"
clean-targets:
    - "target"
    - "dbt_modules"
    - "logs"

# Teradata enforces an "owner reference" check on cross-database views: the
# database owning a view must hold SELECT WITH GRANT OPTION on every upstream
# table, even when the same user owns both. Without this, tests/views over the
# `jaffle_raw` source fail with Error 5315.
on-run-start:
  - "GRANT SELECT ON dbt_raw_dbt TO {{ target.schema }} WITH GRANT OPTION"

seeds:
  jaffle_shop_teradata:
    +schema: raw_dbt
    +enabled: "{{ var('load_source_data', false) }}"

models:
  jaffle_shop_teradata:
    raw:
      staging:
        stg_market_customers:
          +enabled: false
    discovery:
      light-integration:
        lim_market_customers:
          +enabled: false
        lim_market_competitors:
          +enabled: false

vars:
  last_update_ts: 'last_update_ts'

