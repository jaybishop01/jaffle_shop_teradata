version: 2

models:
  - name: dim_customers
    description: Customer dimension built from the surrogate key table, joined with order summary metrics and historized customer lifetime value.

    columns:
      - name: customer_key
        description: Surrogate key for a customer (from `key_customer`).
        tests:
          - unique
          - not_null

      - name: first_order
        description: Date (UTC) of a customer's first order

      - name: most_recent_order
        description: Date (UTC) of a customer's most recent order

      - name: number_of_orders
        description: Count of the number of orders a customer has placed

      - name: customer_lifetime_value
        description: Total customer lifetime value (USD), historized via valid_time.

  - name: fct_orders
    description: Order facts joined with payment breakdown by method.

    columns:
      - name: customer_key
        description: Foreign key to `dim_customers`.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_key

      - name: order_date
        description: Date (UTC) that the order was placed

      - name: status
        description: '{{ doc("orders_status") }}'
        tests:
          - accepted_values:
              arguments:
                values: ['placed', 'shipped', 'completed', 'return_pending', 'returned']

      - name: amount
        description: Total amount (USD) of the order
        tests:
          - not_null

      - name: credit_card_amount_usd
        description: Order amount (USD) paid by credit card
        tests:
          - not_null

      - name: coupon_amount_usd
        description: Order amount (USD) paid by coupon
        tests:
          - not_null

      - name: bank_transfer_amount_usd
        description: Order amount (USD) paid by bank transfer
        tests:
          - not_null

      - name: gift_card_amount_usd
        description: Order amount (USD) paid by gift card
        tests:
          - not_null

  - name: dim_payment_method
    description: This table has basic information about a payment methods used in orders

    columns:
      - name: payment_method
        description: This is a unique identifier code for a payment method
        tests:
          - unique
          - not_null

      - name: total_amount
        description: Total payment amount from all cuatomers for this payment method.

      - name: frequency_count
        description: Count of times this payment method has been used by all customers
