version: 2

sources:
  - name: jaffle_raw
    description: "Raw jaffle shop data, loaded into Teradata via `dbt seed` (one-time bootstrap, gated by `load_source_data` var)."
    schema: "dbt_raw_dbt"
    tables:
      - name: raw_customers
        description: "Customers as captured from the operational system."
        columns:
          - name: id
            description: "Customer natural key from the source system."
            data_tests:
              - unique
              - not_null
          - name: first_name
          - name: last_name
      - name: raw_orders
        description: "Orders as captured from the operational system."
        columns:
          - name: id
            description: "Order natural key from the source system."
            data_tests:
              - unique
              - not_null
          - name: user_id
            description: "FK to `raw_customers.id`."
          - name: order_date
          - name: status
      - name: raw_payments
        description: "Payments as captured from the operational system."
        columns:
          - name: id
            description: "Payment natural key from the source system."
            data_tests:
              - unique
              - not_null
          - name: order_id
            description: "FK to `raw_orders.id`."
          - name: payment_method
          - name: amount

  - name: cloud_storage
    schema: "{{ target.schema }}" # foreign objects are created in the active target schema
    tables:
      - name: raw_market_customers
        description: "Market data from external provider"
        columns:
          - name: Location
            description: "Location of the source file"
          - name: id
            description: "Anonymized customer id"
          - name: spend
            description: "Estimated customer monthly dining out spend"
          - name: ptLocWkt
            description: "Customer residential area (geocoded)"
        external:
          location: "/GS/storage.googleapis.com/clearscape_analytics_demo_data/DEMO_Market/Customer/"
          file_format: "parquet"
      - name: raw_market_competitors
        description: "Market data about competitors"
        external:
          location: "/GS/storage.googleapis.com/clearscape_analytics_demo_data/DEMO_Market/Competitor/"
          file_format: "parquet"

models:
  - name: stg_customers
    columns:
      - name: customer_id
        data_tests:
          - unique
          - not_null

  - name: stg_orders
    columns:
      - name: id
        data_tests:
          - unique
          - not_null
      - name: status
        data_tests:
          - accepted_values:
              arguments:
                values: ['placed', 'shipped', 'completed', 'return_pending', 'returned']

  - name: stg_payments
    columns:
      - name: id
        data_tests:
          - unique
          - not_null
      - name: payment_method
        data_tests:
          - accepted_values:
              arguments:
                values: ['credit_card', 'coupon', 'bank_transfer', 'gift_card']
